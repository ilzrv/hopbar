name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test and Package
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build preview app
        run: make app

      - name: Verify app signature
        run: codesign --verify --deep --strict --verbose=2 dist/Hopbar.app
